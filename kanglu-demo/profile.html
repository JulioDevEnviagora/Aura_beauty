<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Perfil — Kanglu × Aura Beauty</title>
  <link rel="icon" type="image/png" href="assets/aura-logo.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div style="font-family:var(--font-serif);font-size:1.35rem;letter-spacing:0.08em;font-weight:600;">Kanglu</div>
        <div class="sidebar-client">
          <img src="assets/aura-logo.png" alt="">
          <span>Aura Beauty</span>
        </div>
      </div>
      <nav>
        <div class="nav-section">
          <a href="dashboard.html" class="nav-link"><span class="nav-icon">◈</span> Dashboard</a>
          <a href="orders.html" class="nav-link"><span class="nav-icon">☰</span> Pedidos</a>
        </div>
        <div class="nav-section">
          <div class="nav-label">Configurações</div>
          <a href="config-settings.html" class="nav-link"><span class="nav-icon">◎</span> Geral</a>
          <a href="config-settings.html" class="nav-link"><span class="nav-icon">⬡</span> ERP</a>
          <a href="config-settings.html" class="nav-link"><span class="nav-icon">↗</span> Transportadoras</a>
          <a href="config-settings.html" class="nav-link"><span class="nav-icon">◷</span> Prazos</a>
          <a href="config-settings.html" class="nav-link"><span class="nav-icon">∞</span> Integrações</a>
        </div>
        <div class="nav-section">
          <a href="profile.html" class="nav-link active"><span class="nav-icon">○</span> Meu Perfil</a>
          <a href="index.html" class="nav-link"><span class="nav-icon">←</span> Apresentação</a>
          <a href="publico.html" class="nav-link"><span class="nav-icon">↗</span> Ver rastreio público</a>
        </div>
      </nav>
      <div class="sidebar-footer">Demo · Jun 2026</div>
    </aside>

    <main class="admin-main">
      <div class="admin-topbar animate-in">
        <div>
          <h1>Meu Perfil</h1>
          <p>Gerencie suas informações pessoais</p>
        </div>
        <button class="btn btn-primary btn-sm">Salvar alterações</button>
      </div>

      <div class="form-section animate-in delay-1" style="max-width:520px;">
        <div style="display:flex;align-items:center;gap:1.25rem;margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1px solid var(--aura-border);">
          <div class="user-avatar" style="width:64px;height:64px;font-size:1.1rem;">UD</div>
          <div>
            <div style="font-family:var(--font-serif);font-size:1.75rem;margin-bottom:0.35rem;">Usuário Demo</div>
            <span class="status-badge info">Administrador</span>
          </div>
        </div>

        <div class="form-group">
          <label>Nome completo</label>
          <input type="text" value="Usuário Demo">
        </div>
        <div class="form-group">
          <label>E-mail</label>
          <input type="email" value="demo@aurabeauty.com.br">
        </div>
        <div class="form-group">
          <label>Telefone</label>
          <input type="tel" value="(14) 99999-0000">
        </div>
        <div class="form-group">
          <label>Cargo</label>
          <input type="text" value="Administrador">
        </div>
      </div>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
